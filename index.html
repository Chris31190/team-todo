<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team To-do</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Team To-do">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
:root{--bg:#f4f5f7;--card:#fff;--text:#1a1d23;--muted:#6b7280;--border:#e5e7eb;--accent:#2563eb;--accent-h:#1d4ed8;--open:#f59e0b;--progress:#3b82f6;--done:#10b981;--hi:#ef4444;--mid:#f59e0b;--lo:#9ca3af}
*{box-sizing:border-box;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding:24px}
.wrap{max-width:860px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{color:var(--muted);font-size:.9rem;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
form#addForm{display:grid;grid-template-columns:2fr 1.4fr 1fr 1fr 1fr auto;gap:8px}
@media(max-width:700px){form#addForm{grid-template-columns:1fr 1fr}}
input,select,button{font:inherit;padding:9px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text)}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px}
button{cursor:pointer}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent-h)}
.btn-primary:disabled{opacity:.6;cursor:wait}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:#f9fafb}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.toolbar .spacer{flex:1}
.chip{border:1px solid var(--border);background:#fff;border-radius:999px;padding:6px 14px;font-size:.85rem}
.chip.active{background:var(--text);color:#fff;border-color:var(--text)}
ul#list{list-style:none;display:flex;flex-direction:column;gap:8px;padding:0}
li.task{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
li.task.done .title{text-decoration:line-through;color:var(--muted)}
.title{font-weight:600;flex:1;min-width:160px}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:.8rem;color:var(--muted)}
.badge{padding:3px 10px;border-radius:999px;font-size:.75rem;font-weight:600;color:#fff;border:none}
.badge.offen{background:var(--open)}.badge.arbeit{background:var(--progress)}.badge.erledigt{background:var(--done)}
.prio{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.prio.Hoch{background:var(--hi)}.prio.Mittel{background:var(--mid)}.prio.Niedrig{background:var(--lo)}
.num{min-width:24px;text-align:right;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0}
.note-inp{flex:1 1 180px;min-width:120px;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font:inherit;font-size:.85rem;color:var(--text);background:#fafafa}
.note-inp::placeholder{color:#c0c4cc}
.note-inp:focus{outline:2px solid var(--accent);outline-offset:-1px;background:#fff}
.due.over{color:var(--hi);font-weight:600}
.del{background:none;border:none;color:var(--muted);font-size:1.1rem;padding:4px 8px}
.del:hover{color:var(--hi)}
.empty{text-align:center;color:var(--muted);padding:32px 0}
.stats{font-size:.85rem;color:var(--muted)}
#conn{font-size:.75rem;color:var(--muted)}
#conn.live::before{content:"\25CF ";color:var(--done)}
#err{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:none;font-size:.9rem}
#installBtn{display:none}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding:24px;overflow:auto;z-index:50}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:20px;margin-top:20px}
.modal h2{font-size:1.15rem;margin-bottom:6px}
.modal p.hint{color:var(--muted);font-size:.85rem;margin-bottom:14px}
.imp-list{list-style:none;display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow:auto;margin-bottom:16px;padding:0}
.imp-list li{display:flex;gap:10px;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:8px}
.imp-list li input[type=checkbox]{width:18px;height:18px;flex-shrink:0}
.imp-list li .t{flex:1;border:none;padding:4px 6px;font:inherit;background:transparent}
.imp-list li .t:focus{outline:1px solid var(--accent);border-radius:4px}
.imp-prio{padding:4px 6px;font-size:.8rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.modal-actions .count{flex:1;color:var(--muted);font-size:.85rem;align-self:center}
</style>
</head>
<body>
<div class="wrap">
<h1>📋 Team To-do</h1>
<p class="sub">Gemeinsame Aufgabenliste – synchronisiert sich live für alle. <span id="conn">verbinde…</span></p>
<div id="err"></div>
<div class="card">
<form id="addForm">
<input id="fTitle" type="text" placeholder="Neue Aufgabe…" required>
<input id="fNote" type="text" placeholder="Notiz (optional)">
<input id="fWho" type="text" placeholder="Zuständig" list="people">
<datalist id="people"></datalist>
<input id="fDue" type="date" title="Fällig am">
<select id="fPrio"><option>Mittel</option><option>Hoch</option><option>Niedrig</option></select>
<button class="btn-primary" id="addBtn" type="submit">Hinzufügen</button>
</form>
</div>
<div class="toolbar">
<button class="chip active" data-f="alle">Alle</button>
<button class="chip" data-f="Offen">Offen</button>
<button class="chip" data-f="In Arbeit">In Arbeit</button>
<button class="chip" data-f="Erledigt">Erledigt</button>
<span class="spacer"></span>
<button class="btn-ghost" id="importBtn" title="Aufgaben aus PDF-, Word- oder OpenDocument-Datei importieren">📄 Liste importieren</button>
<button class="btn-ghost" id="installBtn" title="Als App installieren">⬇️ App installieren</button>
<span class="stats" id="stats"></span>
</div>
<input type="file" id="fileInput" accept=".pdf,.docx,.odt" style="display:none">
<ul id="list"><li class="empty">Lade Aufgaben…</li></ul>
</div>

<div class="overlay" id="impOverlay">
<div class="modal">
<h2>Aufgaben importieren</h2>
<p class="hint" id="impHint">Prüfe die erkannten Aufgaben, hake die gewünschten ab und passe Titel/Priorität bei Bedarf an.</p>
<ul class="imp-list" id="impList"></ul>
<div class="modal-actions">
<span class="count" id="impCount"></span>
<button class="btn-ghost" id="impCancel">Abbrechen</button>
<button class="btn-primary" id="impConfirm">Ausgewählte übernehmen</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
var sb = supabase.createClient("https://hbbizdljommgweemprso.supabase.co","sb_publishable_7ygG8u4rjp5lX6PplyzLlQ_mJfSBsO7");
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
var STATUS = ["Offen","In Arbeit","Erledigt"];
var tasks = [];
var filter = "alle";
function showErr(msg){var el=document.getElementById("err");el.textContent=msg;el.style.display=msg?"block":"none";}
function fmtDate(d){if(!d)return "";var p=d.split("-");return p[2]+"."+p[1]+"."+p[0];}
function esc(s){var div=document.createElement("div");div.textContent=s||"";return div.innerHTML;}
function fetchTasks(){sb.from("todos").select("*").order("pos",{ascending:true,nullsFirst:false}).order("created_at",{ascending:true}).then(function(r){if(r.error){showErr("Fehler beim Laden: "+r.error.message);return;}showErr("");tasks=r.data;render();});}
function nextPos(){var mx=0;tasks.forEach(function(t){if(typeof t.pos==="number"&&t.pos>mx)mx=t.pos;});return mx+1;}
function render(){
var list=document.getElementById("list");
var shown=tasks.filter(function(t){return filter==="alle"||t.status===filter;});
list.innerHTML="";
if(!shown.length){list.innerHTML='<li class="empty">Keine Aufgaben.</li>';}
var today=new Date().toISOString().slice(0,10);
shown.forEach(function(t,idx){
var li=document.createElement("li");
li.className="task"+(t.status==="Erledigt"?" done":"");
var cls=t.status==="Offen"?"offen":t.status==="In Arbeit"?"arbeit":"erledigt";
var over=t.due&&t.due<today&&t.status!=="Erledigt";
var num=(typeof t.pos==="number")?t.pos:(idx+1);
li.innerHTML='<span class="num">'+num+'</span>'+'<span class="prio '+t.prio+'" title="Priorität: '+t.prio+'"></span>'+'<span class="title">'+esc(t.title)+'</span>'+'<input class="note-inp" placeholder="Notiz…" value="'+esc(t.note||"")+'" title="Notiz – wird automatisch gespeichert">'+'<span class="meta">'+(t.who?"👤 "+esc(t.who):"")+(t.due?'<span class="due'+(over?" over":"")+'">📅 '+fmtDate(t.due)+(over?" ⚠️":"")+"</span>":"")+'</span>'+'<button class="badge '+cls+'" title="Klicken zum Weiterschalten">'+t.status+'</button>'+'<button class="del" title="Löschen">✕</button>';
var noteEl=li.querySelector(".note-inp");
noteEl.onclick=function(e){e.stopPropagation();};
noteEl.onchange=function(){var v=noteEl.value;t.note=v;sb.from("todos").update({note:v}).eq("id",t.id).then(function(r){if(r.error){showErr("Fehler beim Speichern der Notiz: "+r.error.message);fetchTasks();}});};
li.querySelector(".badge").onclick=function(){var next=STATUS[(STATUS.indexOf(t.status)+1)%STATUS.length];t.status=next;render();sb.from("todos").update({status:next}).eq("id",t.id).then(function(r){if(r.error){showErr("Fehler beim Speichern: "+r.error.message);fetchTasks();}});};
li.querySelector(".del").onclick=function(){if(!confirm(t.title+" löschen?"))return;tasks=tasks.filter(function(x){return x!==t;});render();sb.from("todos").delete().eq("id",t.id).then(function(r){if(r.error){showErr("Fehler beim Löschen: "+r.error.message);fetchTasks();}});};
list.appendChild(li);
});
var done=tasks.filter(function(t){return t.status==="Erledigt";}).length;
document.getElementById("stats").textContent=tasks.length?done+" / "+tasks.length+" erledigt":"";
var seen={};var opts="";
tasks.forEach(function(t){if(t.who&&!seen[t.who]){seen[t.who]=1;opts+='<option value="'+esc(t.who)+'">';}});
document.getElementById("people").innerHTML=opts;
}
document.getElementById("addForm").onsubmit=function(e){
e.preventDefault();
var btn=document.getElementById("addBtn");
btn.disabled=true;
var row={title:document.getElementById("fTitle").value.trim(),note:document.getElementById("fNote").value.trim(),who:document.getElementById("fWho").value.trim(),due:document.getElementById("fDue").value||null,prio:document.getElementById("fPrio").value,status:"Offen",pos:nextPos()};
sb.from("todos").insert(row).then(function(r){
btn.disabled=false;
if(r.error){showErr("Fehler beim Anlegen: "+r.error.message);return;}
document.getElementById("addForm").reset();
document.getElementById("fTitle").focus();
fetchTasks();
});
};
document.querySelectorAll(".chip[data-f]").forEach(function(btn){
btn.onclick=function(){
filter=btn.getAttribute("data-f");
document.querySelectorAll(".chip[data-f]").forEach(function(b){b.classList.toggle("active",b===btn);});
render();
};
});

/* ---------- Import PDF / DOCX ---------- */
var importedRows = [];
document.getElementById("importBtn").onclick=function(){document.getElementById("fileInput").click();};
document.getElementById("fileInput").onchange=function(e){
var file=e.target.files[0];
if(!file)return;
showErr("");
var name=file.name.toLowerCase();
var reader=new FileReader();
reader.onload=function(){
var buf=reader.result;
if(name.endsWith(".docx")){
mammoth.extractRawText({arrayBuffer:buf}).then(function(res){parseLines(res.value);}).catch(function(err){showErr("DOCX konnte nicht gelesen werden: "+err.message);});
}else if(name.endsWith(".pdf")){
pdfjsLib.getDocument({data:buf}).promise.then(function(pdf){
var pages=[];for(var i=1;i<=pdf.numPages;i++)pages.push(i);
return Promise.all(pages.map(function(n){return pdf.getPage(n).then(function(p){return p.getTextContent().then(function(tc){
// Zeilen anhand y-Position rekonstruieren
var byLine={};
tc.items.forEach(function(it){var y=Math.round(it.transform[5]);(byLine[y]=byLine[y]||[]).push(it.str);});
var ys=Object.keys(byLine).map(Number).sort(function(a,b){return b-a;});
return ys.map(function(y){return byLine[y].join(" ");}).join("\n");
});});}));
}).then(function(pageTexts){parseLines(pageTexts.join("\n"));}).catch(function(err){showErr("PDF konnte nicht gelesen werden: "+err.message);});
}else if(name.endsWith(".odt")){
JSZip.loadAsync(buf).then(function(zip){var f=zip.file("content.xml");if(!f)throw new Error("content.xml fehlt");return f.async("string");}).then(function(xml){
var doc=new DOMParser().parseFromString(xml,"application/xml");
var nodes=doc.getElementsByTagName("*");var lines=[];
for(var i=0;i<nodes.length;i++){var ln=nodes[i].localName;if(ln==="p"||ln==="h"){var txt=nodes[i].textContent;if(txt)lines.push(txt);}}
parseLines(lines.join("\n"));
}).catch(function(err){showErr("ODT konnte nicht gelesen werden: "+err.message);});
}else{showErr("Bitte eine .pdf-, .docx- oder .odt-Datei wählen.");}
};
document.getElementById("fileInput").value="";
};
function parseLines(text){
var lines=text.split(/\r?\n/).map(function(l){return l.replace(/^\s*(?:[-*•·•▪●]|\d+[.)])\s*/,"").trim();}).filter(function(l){return l.length>=2;});
// Duplikate innerhalb der Datei entfernen
var seen={};lines=lines.filter(function(l){var k=l.toLowerCase();if(seen[k])return false;seen[k]=1;return true;});
if(!lines.length){showErr("In der Datei wurden keine Aufgaben-Zeilen gefunden.");return;}
importedRows=lines.map(function(l){return {title:l,prio:"Mittel"};});
renderImport();
document.getElementById("impOverlay").classList.add("show");
}
function renderImport(){
var ul=document.getElementById("impList");ul.innerHTML="";
importedRows.forEach(function(row,idx){
var li=document.createElement("li");
li.innerHTML='<input type="checkbox" checked>'+'<input class="t" value="'+esc(row.title)+'">'+'<select class="imp-prio"><option>Mittel</option><option>Hoch</option><option>Niedrig</option></select>';
li.querySelector(".imp-prio").value=row.prio;
li.querySelector('input[type=checkbox]').onchange=updateCount;
li.querySelector(".t").oninput=function(){importedRows[idx].title=this.value;};
li.querySelector(".imp-prio").onchange=function(){importedRows[idx].prio=this.value;};
li.dataset.idx=idx;
ul.appendChild(li);
});
updateCount();
}
function updateCount(){
var n=document.querySelectorAll("#impList input[type=checkbox]:checked").length;
document.getElementById("impCount").textContent=n+" von "+importedRows.length+" ausgewählt";
}
document.getElementById("impCancel").onclick=function(){document.getElementById("impOverlay").classList.remove("show");};
document.getElementById("impConfirm").onclick=function(){
var rows=[];
document.querySelectorAll("#impList li").forEach(function(li){
var cb=li.querySelector('input[type=checkbox]');
if(!cb.checked)return;
var title=li.querySelector(".t").value.trim();
if(!title)return;
rows.push({title:title,note:"",who:"",due:null,prio:li.querySelector(".imp-prio").value,status:"Offen"});
});
if(!rows.length){document.getElementById("impOverlay").classList.remove("show");return;}
var p=nextPos();rows.forEach(function(r){r.pos=p++;});
var btn=document.getElementById("impConfirm");btn.disabled=true;btn.textContent="Übernehme…";
sb.from("todos").insert(rows).then(function(r){
btn.disabled=false;btn.textContent="Ausgewählte übernehmen";
if(r.error){showErr("Fehler beim Import: "+r.error.message);return;}
document.getElementById("impOverlay").classList.remove("show");
fetchTasks();
});
};

/* ---------- Live-Sync ---------- */
sb.channel("todos-changes").on("postgres_changes",{event:"*",schema:"public",table:"todos"},fetchTasks).subscribe(function(status){
var el=document.getElementById("conn");
if(status==="SUBSCRIBED"){el.textContent="live";el.classList.add("live");}
else{el.textContent="";}
});
setInterval(fetchTasks,30000);
fetchTasks();

/* ---------- PWA ---------- */
if("serviceWorker" in navigator){
window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});
}
var deferredPrompt=null;
window.addEventListener("beforeinstallprompt",function(e){
e.preventDefault();deferredPrompt=e;
document.getElementById("installBtn").style.display="inline-block";
});
document.getElementById("installBtn").onclick=function(){
if(!deferredPrompt)return;
deferredPrompt.prompt();
deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById("installBtn").style.display="none";});
};
window.addEventListener("appinstalled",function(){document.getElementById("installBtn").style.display="none";});
</script>
</body>
</html>
